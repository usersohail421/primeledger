<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #000000;
            padding: 10px 40px 40px 40px;  /* top right bottom left */
        }

        .header {
            display: table;
            width: 100%;
            margin-bottom: 20px;
        }

        .header-left {
            display: table-cell;
            vertical-align: top;
            width: 50%;
        }

        .header-right {
            display: table-cell;
            vertical-align: top;
            text-align: right;
            width: 50%;
            padding-top: 0;
        }

        .header-left p {
            font-size: 16px;
            font-weight: bold;
        }

        .company-logo {
            width: 120px;
            height: auto;
            display: block;
            margin-left: auto;
            margin-top: -20px;
            margin-bottom: 0;
        }

        .company-name {
            font-size: 13px;
            font-weight: bold;
        }

        .project-section {
            text-align: center;
            margin-bottom: 6px;
        }

        .project-name {
            font-size: 30px;
            font-weight: bolder;
            padding-bottom: 15px;
            text-transform: uppercase;
            word-spacing: 5px;
            font-family: 'Libre Baskerville', serif;
        }

        .bill-number {
            font-size: 20px;
            color: #444444;
            margin-bottom: 4px;
            text-align: center;
        }

        .bill-period {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .total_amount{
            font-size: 25px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table th {
            background-color: #f2f2f2;
            border: 1px solid #000000;
            padding: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        table td {
            border: 1px solid #000000;
            padding: 8px;
            font-size: 18px;
        }

        .col-date {
            width: 20%;
            text-align: center;
        }

        .col-item {
            width: 55%;
            text-align: center;
            text-transform: capitalize;
        }

        .col-amount {
            width: 25%;
            text-align: right;
        }

        .total-section {
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 20px;
            border-top: 1px solid #cccccc;
            padding-top: 12px;
            font-size: 11px;
        }

        .footer-address {
            font-size: 11px;
            color: #333333;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<!-- Header: Date left, Logo right -->
<div class="header">
    <div class="header-left">
        <p>Date of Bill Creation: <span th:text="${billDate}"></span></p>
        <p th:if="${billNumber != null}">Bill No: <span th:text="${billNumber}"></span></p>
    </div>
    <div class="header-right">
        <img th:if="${logoUrl != null and !#strings.isEmpty(logoUrl)}"
             th:src="${logoUrl}"

<!-- Project Name -->
<div class="project-section">
    <p class="project-name"> <span th:text="${projectName}"></span></p>
</div>

<!-- Bill Period -->
<div th:if="${billPeriodStart != null and billPeriodEnd != null}" class="bill-period">
    <p>Bill Period : <span th:text="${billPeriodStart}"></span> - <span th:text="${billPeriodEnd}"></span></p>
</div>

<!-- Items Table -->
<table>
    <thead>
    <tr>
        <th class="col-date">Date</th>
        <th class="col-item">Item Name</th>
        <th class="col-amount">Amount</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td class="col-date" th:text="${item.expenseDate != null ? item.expenseDate : ''}"></td>
        <td class="col-item" th:text="${item.itemName}"></td>
        <td class="col-amount" th:text="${item.amount}"></td>
    </tr>
    </tbody>
</table>

<!-- Total -->
<div class="total-section">
    <p class="total_amount">Total Amount = <span th:text="${totalAmount}"></span></p>
</div>

<!-- Footer -->
<div class="footer">
    <p th:if="${officeAddress != null and !#strings.isEmpty(officeAddress)}">
        Address of office : <span class="footer-address" th:text="${officeAddress}"></span>
    </p>
</div>

</body>
</html>
