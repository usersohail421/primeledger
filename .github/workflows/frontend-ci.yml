name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Frontend/**'
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/site-ledger-hub-main/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/site-ledger-hub-main
        run: npm ci

      - name: Run tests
        working-directory: Frontend/site-ledger-hub-main
        run: npm run test

      - name: Build production bundle
        working-directory: Frontend/site-ledger-hub-main
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: primeledger-frontend
          path: Frontend/site-ledger-hub-main/dist/